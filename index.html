<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GM BDIX TV</title>

    <script src="https://pl29009789.effectivecpmnetwork.com/6b/04/58/6b0458e4250817278ae03668731a0c2c.js"></script>
    <script src="https://pl29009767.effectivecpmnetwork.com/2b/f9/cb/2bf9cb379d8c8f579997c57903411657.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- ⚡ ইন-ব্রাউজার ডাইরেক্ট প্লেয়ার লাইব্রেরি -->
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body { margin: 0; background-color: #060814; color: #ffffff; font-family: system-ui, sans-serif; overflow: hidden; padding-top: 60px; }
        
        @keyframes rgbSwipe { to { background-position: 200% center; } }
        .rgb-text { font-weight: 800; background: linear-gradient(to right, #00ffff, #0088ff, #22d3ee, #00ffff); background-size: 200% auto; color: transparent; -webkit-background-clip: text; background-clip: text; animation: rgbSwipe 4s linear infinite; }

        .channel-card { 
            background: linear-gradient(135deg, #111625 0%, #0d1122 100%);
            border: 1px solid rgba(34, 211, 238, 0.1); 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .channel-card:hover { 
            border-color: #22d3ee; 
            background-color: #171e33;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(34, 211, 238, 0.2);
        }
        
        .tab-btn { 
            background-color: #111625; 
            color: #9ca3af; 
            border: 1px solid #1e2640;
            white-space: nowrap; 
            transition: all 0.2s; 
        }
        .tab-btn.active { 
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #000000; 
            border-color: #22d3ee;
            font-weight: bold; 
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.4);
        }
        
        .bdix-fixed-top { 
            position: fixed; 
            top: 60px; 
            left: 0; 
            right: 0; 
            z-index: 100; 
            background-color: #060814; 
        }
        
        .bdix-channels-scroll { 
            position: absolute; 
            top: 385px; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            overflow-y: auto; 
            padding: 12px;
            background-color: #060814;
        }
        
        .premium-player-box {
            position: relative;
            box-shadow: 0 4px 30px rgba(34, 211, 238, 0.15);
            border-bottom: 2px solid rgba(34, 211, 238, 0.2);
        }

        video {
            object-fit: contain; 
            width: 100%;
            height: 100%;
        }
        
        .vip-progress-container {
            width: 100%;
            max-width: 250px;
            height: 4px;
            background: #111625;
            border-radius: 10px;
            overflow: hidden;
        }
        .vip-progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px #22d3ee;
            animation: vipLoad 1.5s infinite ease-in-out;
            transform-origin: left;
        }
        @keyframes vipLoad {
            0% { transform: scaleX(0) translateX(0); }
            50% { transform: scaleX(0.5) translateX(50%); }
            100% { transform: scaleX(0) translateX(200%); }
        }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 right-0 h-[60px] z-[500] px-4 bg-black/90 backdrop-blur-md flex justify-between items-center border-b border-white/5">
        <h1 class="rgb-text text-xl tracking-wider uppercase">GM BDIX TV</h1>
        <div class="text-[10px] bg-cyan-500/10 text-cyan-400 px-3 py-1 rounded-full border border-cyan-500/20 font-bold uppercase tracking-wider" id="live-count-badge">0 Channels</div>
    </header>

    <div class="bdix-fixed-top">
        <div class="w-full aspect-video bg-black premium-player-box overflow-hidden relative">
            <video autoplay class="w-full h-full" controls id="main-video-player" playsinline webkit-playsinline></video>
            
            <div id="player-placeholder" class="absolute inset-0 bg-gray-950 flex flex-col items-center justify-center text-center p-4 pointer-events-none transition-opacity duration-300">
                <i class="fas fa-play text-3xl text-cyan-400 animate-pulse mb-2"></i>
                <p id="now-playing-title" class="text-xs font-medium text-gray-400">GM TV LIVE - Select Channel</p>
            </div>
        </div>

        <!-- 📱 এক্সটার্নাল প্লেয়ার জোন (ব্রাউজারে প্লে না হলে এটি দিয়ে ১ ক্লিকে প্লে করুন) -->
        <div id="external-player-options" class="hidden p-1.5 bg-[#0d1122] border-b border-gray-900 flex justify-center gap-2">
            <span class="text-[9px] text-gray-400 self-center">Not Playing? Open in:</span>
            <a id="vlc-btn" href="#" class="bg-orange-500 hover:bg-orange-600 text-white text-[10px] font-bold px-3 py-1 rounded-full flex items-center gap-1">
                <i class="fas fa-traffic-cone"></i> VLC
            </a>
            <a id="mx-btn" href="#" class="bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold px-3 py-1 rounded-full flex items-center gap-1">
                <i class="fas fa-play-circle"></i> MX Player
            </a>
        </div>

        <div class="p-2 bg-[#0d1122] border-b border-gray-900 flex items-center justify-between gap-2">
            <div class="flex items-center gap-1.5 flex-1 min-w-0">
                <div class="relative w-24 sm:w-32 shrink-0">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-500 text-[11px]">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="channel-search-input" oninput="filterChannelsBySearch()" placeholder="Search..." class="w-full bg-[#111625] text-white text-[11px] pl-6 pr-2 py-1.5 rounded-full border border-gray-800 focus:outline-none focus:border-cyan-500 transition-all placeholder-gray-600">
                </div>
                <button class="tab-btn active text-[11px] px-3.5 py-1.5 rounded-full" onclick="resetChannelFilters(this)">ALL CHANNEL</button>
            </div>
        </div>
    </div>

    <div class="bdix-channels-scroll">
        <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-8 gap-2" id="channel-grid">
            <div id="vip-loader" class="col-span-4 flex flex-col items-center justify-center py-20 w-full mx-auto">
                <div class="vip-progress-container mb-3">
                    <div class="vip-progress-bar"></div>
                </div>
                <span id="loader-text" class="text-[10px] text-cyan-400/70 tracking-widest uppercase font-semibold">LOADING TV Channels...</span>
            </div>
        </div>
    </div>

    <script type="module">
        window.masterChannels = [];

        // 🛑 আপনার দেওয়া নতুন GitHub M3U প্লেলিস্টের লিংক
        const m3uPlaylistUrl = "https://raw.githubusercontent.com/Zaman-Topu/Ip-tv-Collection/main/FINAL_IPTV_ACTIVE.m3u";

        function startAppEngine() {
            // 💾 Local Storage থেকে পূর্বে সেভ করা চ্যানেল ডাটা লোড করা হচ্ছে (স্পিড বৃদ্ধির জন্য)
            var cachedChannels = null;
            try {
                cachedChannels = localStorage.getItem("gm_cached_channels");
            } catch (e) {
                console.warn("LocalStorage storage blocked.");
            }

            if (cachedChannels) {
                try {
                    window.masterChannels = JSON.parse(cachedChannels);
                    hideVipLoader();
                    buildChannelsGrid(window.masterChannels);
                } catch(e) {
                    try { localStorage.clear(); } catch(x){}
                }
            }
            executePlaylistFetch();
        }

        function executePlaylistFetch() {
            var fetchUrls = [
                m3uPlaylistUrl, 
                "https://corsproxy.io/?" + encodeURIComponent(m3uPlaylistUrl),
                "https://api.allorigins.win/raw?url=" + encodeURIComponent(m3uPlaylistUrl)
            ];
            
            tryFetchSequence(fetchUrls, 0);
        }

        function tryFetchSequence(urls, index) {
            if (index >= urls.length) {
                if (window.masterChannels.length === 0) {
                    showErrorMsg("Unable to load channels. Connection timed out.");
                }
                return;
            }

            console.log("Fetching playlist with method " + (index + 1));

            fetch(urls[index])
                .then(r => {
                    if (!r.ok) throw new Error("HTTP error " + r.status);
                    return r.text();
                })
                .then((responseText) => {
                    var parsedChannels = parseM3U(responseText);
                    
                    if (parsedChannels && parsedChannels.length > 0) {
                        window.masterChannels = parsedChannels;
                        
                        // 💾 ভবিষ্যতে দ্রুত লোডের জন্য লোকাল মেমরিতে সেভ করা হচ্ছে
                        try {
                            localStorage.setItem("gm_cached_channels", JSON.stringify(parsedChannels));
                        } catch(e){}

                        hideVipLoader();
                        buildChannelsGrid(window.masterChannels);
                    } else {
                        throw new Error("Empty channel list");
                    }
                }).catch((err) => {
                    console.warn(`Fetch method ${index + 1} failed. Trying next...`);
                    tryFetchSequence(urls, index + 1);
                });
        }

        // M3U ফাইল পার্সার
        function parseM3U(data) {
            var playlist = [];
            var lines = data.split('\n');
            var currentItem = null;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    currentItem = {};
                    
                    var nameMatch = line.match(/,(.+)$/);
                    currentItem.name = nameMatch ? nameMatch[1].trim() : "Live TV";
                    
                    var logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentItem.stream_icon = logoMatch ? logoMatch[1] : "";
                    
                } else if (line.startsWith('http') && currentItem) {
                    currentItem.url = line;
                    var parts = line.split('/');
                    currentItem.stream_id = parts[parts.length - 1].replace(/\.[^/.]+$/, ""); 
                    
                    playlist.push(currentItem);
                    currentItem = null;
                }
            }
            return playlist;
        }

        function hideVipLoader() {
            var loader = document.getElementById('vip-loader');
            if(loader) { loader.style.display = 'none'; }
        }

        function showErrorMsg(msg) {
            var grid = document.getElementById('channel-grid');
            if(grid) {
                grid.innerHTML = `<div class="col-span-4 text-center text-red-400 py-12 text-xs">
                    <i class="fas fa-triangle-exclamation text-xl mb-2"></i><br>${msg}
                </div>`;
            }
        }

        function buildChannelsGrid(items) {
            var grid = document.getElementById('channel-grid');
            if(!grid) return;
            
            var badge = document.getElementById('live-count-badge');
            if(badge) badge.innerText = items.length + " Channels";

            grid.innerHTML = items.map(function(channel) {
                var iconUrl = channel.stream_icon || "https://placehold.co/150x150/111625/22d3ee?text=TV";
                var secureName = (channel.name || "Live TV").replace(/'/g, "\\'");
                var secureIcon = iconUrl.replace(/'/g, "\\'");
                var secureUrl = channel.url.replace(/'/g, "\\'");
                
                return '<div class="channel-card p-1.5 flex flex-col items-center justify-center text-center aspect-square shadow-md" onclick="playLiveChannel(\''+secureUrl+'\', \''+secureName+'\')">' +
                       '<div class="w-full h-11 flex items-center justify-center overflow-hidden mb-1 rounded-lg bg-black/40 p-1">' +
                       '<img src="'+iconUrl+'" class="max-w-full max-h-full object-contain" onerror="this.src=\'https://placehold.co/150x150/111625/22d3ee?text=TV\'"/>' +
                       '</div>' +
                       '<h4 class="text-[9px] text-gray-300 line-clamp-1 uppercase font-medium w-full text-ellipsis overflow-hidden px-0.5">'+(channel.name || 'Live')+'</h4>' +
                       '</div>';
            }).join('');
        }

        window.resetChannelFilters = function(buttonElement) {
            document.getElementById('channel-search-input').value = "";
            buildChannelsGrid(window.masterChannels);
        };

        window.filterChannelsBySearch = function() {
            var query = document.getElementById('channel-search-input').value.toLowerCase().trim();
            var filtered = window.masterChannels;

            if(query !== "") {
                filtered = filtered.filter(function(channel) {
                    var channelName = (channel.name || "").toLowerCase();
                    return channelName.includes(query);
                });
            }
            buildChannelsGrid(filtered);
        };

        window.playLiveChannel = function(streamUrl, name) {
            document.getElementById('player-placeholder').style.opacity = '0';
            
            // এক্সটার্নাল প্লেয়ার লিঙ্ক জেনারেশন
            setupExternalPlayerLinks(streamUrl);

            var player = document.getElementById('main-video-player');
            if(!player) return;

            document.getElementById('now-playing-title').innerText = name;

            if (window.hlsInstance) { window.hlsInstance.destroy(); window.hlsInstance = null; }
            if (window.mpegtsPlayer) { window.mpegtsPlayer.destroy(); window.mpegtsPlayer = null; }

            if (streamUrl.includes('.ts') && mpegts.getFeatureList().mseLivePlayback) {
                try {
                    var mpegtsPlayer = mpegts.createPlayer({
                        type: 'mpegts',
                        isLive: true,
                        url: streamUrl
                    }, {
                        enableWorker: true,
                        lazyLoadMaxDuration: 3 * 60,
                        seekType: 'range'
                    });
                    
                    mpegtsPlayer.attachMediaElement(player);
                    mpegtsPlayer.load();
                    mpegtsPlayer.play().catch(function(){});
                    window.mpegtsPlayer = mpegtsPlayer;

                    mpegtsPlayer.on(mpegts.Events.ERROR, function() {
                        playHlsFallback(streamUrl, player);
                    });

                } catch(e) {
                    playHlsFallback(streamUrl, player);
                }
            } else {
                playHlsFallback(streamUrl, player);
            }
        };

        function playHlsFallback(url, player) {
            if (Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(player);
                window.hlsInstance = hls;
                player.play().catch(function(){});
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = url;
                player.play().catch(function(){});
            }
        }

        // 📱 এক্সটার্নাল প্লেয়ার সেটআপ ফাংশন
        function setupExternalPlayerLinks(streamUrl) {
            var extZone = document.getElementById('external-player-options');
            if (extZone) {
                extZone.classList.remove('hidden');
                
                // VLC Player লিঙ্ক
                document.getElementById('vlc-btn').href = "vlc://" + streamUrl.replace("http://", "");
                
                // MX Player লিঙ্ক (অ্যান্ড্রয়েড)
                document.getElementById('mx-btn').href = "intent://" + streamUrl.replace("http://", "") + "#Intent;scheme=http;package=com.mxtech.videoplayer.ad;end";
            }
        }

        startAppEngine();
    </script>
</body>
</html>
