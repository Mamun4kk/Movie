<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GM FILMS LIVE</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body { margin: 0; background-color: #060814; color: #ffffff; font-family: system-ui, sans-serif; overflow: hidden; }
        
        /* BDIX স্টাইল চ্যানেল কার্ড */
        .channel-card { 
            background-color: #111625; 
            border: 1px solid #1e2640; 
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        }
        .channel-card:hover { 
            border-color: #22d3ee; 
            background-color: #171e33;
        }
        
        /* ক্যাটাগরি বাটন স্টাইল */
        .tab-btn { 
            background-color: #111625; 
            color: #9ca3af; 
            border: 1px solid #1e2640;
            white-space: nowrap; 
            transition: all 0.2s; 
        }
        .tab-btn.active { 
            background-color: #22d3ee; 
            color: #000000; 
            border-color: #22d3ee;
            font-weight: bold; 
        }
        
        /* ফিক্সড টপ জোন */
        .bdix-fixed-top { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 100; 
            background-color: #060814; 
        }
        
        /* চ্যানেল লিস্ট স্ক্রোলিং এরিয়া */
        .bdix-channels-scroll { 
            position: absolute; 
            top: 275px; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            overflow-y: auto; 
            padding: 10px;
            background-color: #060814;
        }
        
        /* প্রিমিয়াম প্লেয়ার বক্স */
        .premium-player-box {
            position: relative;
            box-shadow: 0 4px 30px rgba(34, 211, 238, 0.15);
            border-bottom: 2px solid #1e2640;
        }

        video {
            object-fit: contain; 
            width: 100%;
            height: 100%;
        }
        video:fullscreen {
            object-fit: fill !important; 
        }
        video:-webkit-full-screen {
            object-fit: fill !important;
        }
        
        /* ⚡ ভিআইপি নিওন লোডিং বার অ্যানিমেশন */
        .vip-progress-container {
            width: 100%;
            max-width: 250px;
            height: 4px;
            background: #111625;
            border-radius: 10px;
            overflow: hidden;
        }
        .vip-progress-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            box-shadow: 0 0 15px #22d3ee;
            animation: vipLoad 1.5s infinite ease-in-out;
            transform-origin: left;
        }
        @keyframes vipLoad {
            0% { transform: scaleX(0) translateX(0); }
            50% { transform: scaleX(0.5) translateX(50%); }
            100% { transform: scaleX(0) translateX(200%); }
        }

        /* 🔔 বাম পাশে ফিক্সড নোটিশ বক্স */
        .fixed-left-notice {
            position: fixed;
            left: 12px;
            bottom: 20px;
            z-index: 150;
            background: linear-gradient(135deg, #111625 0%, #0d1122 100%);
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            max-width: 180px;
            padding: 8px 12px;
        }
    </style>
</head>
<body>

    <div class="bdix-fixed-top">
        <div class="w-full aspect-video bg-black premium-player-box overflow-hidden relative">
            <video autoplay class="w-full h-full" controls id="main-video-player" playsinline webkit-playsinline></video>
            
            <div id="player-placeholder" class="absolute inset-0 bg-gray-950 flex flex-col items-center justify-center text-center p-4 pointer-events-none transition-opacity duration-300">
                <i class="fas fa-play text-3xl text-cyan-400 animate-pulse mb-2"></i>
                <p id="now-playing-title" class="text-xs font-medium text-gray-400">GM TV LIVE - Select Channel</p>
            </div>
        </div>

        <div class="p-2 bg-[#0d1122] border-b border-gray-900 flex items-center justify-between gap-2">
            
            <div class="flex items-center gap-1.5 flex-1 min-w-0">
                <div class="relative w-24 sm:w-32 shrink-0">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-gray-500 text-[11px]">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" id="channel-search-input" oninput="filterChannelsBySearch()" placeholder="Search..." class="w-full bg-[#111625] text-white text-[11px] pl-6 pr-2 py-1.5 rounded-full border border-gray-800 focus:outline-none focus:border-cyan-500 transition-all placeholder-gray-600">
                </div>

                <button class="tab-btn active text-[11px] px-3.5 py-1.5 rounded-full" onclick="resetChannelFilters(this)">ALL CHANNEL</button>
            </div>

            <div class="flex items-center gap-1.5 shrink-0">
                <a href="https://t.me/bdixtvlive" target="_blank" class="flex items-center gap-1 bg-[#1d9bd1] hover:bg-[#1a8aad] text-white text-[10px] font-bold px-2.5 py-1.5 rounded-full shadow-md transition-all">
                    <i class="fab fa-telegram-plane text-xs"></i>
                    <span>Telegram</span>
                </a>
                
                <a href="https://wa.me/01338750739" target="_blank" class="flex items-center gap-1 bg-[#25d366] hover:bg-[#20ba59] text-white text-[10px] font-bold px-2.5 py-1.5 rounded-full shadow-md transition-all">
                    <i class="fab fa-whatsapp text-xs"></i>
                    <span>WhatsApp</span>
                </a>
            </div>

        </div>
    </div>

    <div class="bdix-channels-scroll">
        <div class="grid grid-cols-4 sm:grid-cols-5 md:grid-cols-8 gap-2" id="channel-grid">
            
            <div id="vip-loader" class="col-span-4 flex flex-col items-center justify-center py-20 w-full mx-auto">
                <div class="vip-progress-container mb-3">
                    <div class="vip-progress-bar"></div>
                </div>
                <span class="text-[10px] text-cyan-400/70 tracking-widest uppercase font-semibold">LODGING TV Channels...</span>
            </div>

        </div>
    </div>

    <div class="fixed-left-notice flex items-start gap-2">
        <div class="text-cyan-400 mt-0.5 text-xs"><i class="fas fa-circle-info animate-bounce"></i></div>
        <div>
            <h5 class="text-[10px] font-bold uppercase tracking-wider text-cyan-400 mb-0.5">GM BDIX TV</h5>
            <p class="text-[9px] text-gray-400 leading-tight">কোনো চ্যানেল না চললে এডমিনের সাথে যোগাযোগ করুন।</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAIgBnYES3wiKRGwo_cnPb3IcpzhiXtqu8",
            authDomain: "iptv-bde83.firebaseapp.com",
            databaseURL: "https://iptv-bde83-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "iptv-bde83",
            storageBucket: "iptv-bde83.firebasestorage.app",
            messagingSenderId: "531160819729",
            appId: "1:531160819729:web:833840c0a6200db23ce9b0",
            measurementId: "G-EMB3R8B1YH"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.masterChannels = [];
        window.apiDns = ""; 
        window.apiUser = "";
        window.apiPass = "";

        var proxyList = [
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?",
            "" 
        ];

        function checkLocalCache() {
            var cachedChannels = localStorage.getItem("gm_cached_channels");
            var cachedDns = localStorage.getItem("gm_cached_dns");
            var cachedUser = localStorage.getItem("gm_cached_user");
            var cachedPass = localStorage.getItem("gm_cached_pass");

            if (cachedChannels && cachedDns) {
                window.masterChannels = JSON.parse(cachedChannels);
                window.apiDns = cachedDns;
                window.apiUser = cachedUser;
                window.apiPass = cachedPass;
                
                hideVipLoader();
                buildChannelsGrid(window.masterChannels);
            }
        }

        function startAppEngine() {
            checkLocalCache();

            const dbRef = ref(db);
            get(child(dbRef, 'server_settings')).then((snapshot) => {
                if (snapshot.exists()) {
                    var config = snapshot.val();
                    if(config.dns && config.username && config.password) {
                        window.apiDns = config.dns;
                        window.apiUser = config.username;
                        window.apiPass = config.password;
                    }
                }
                executePlaylistFetch(0);
            }).catch(() => {
                executePlaylistFetch(0);
            });
        }

        function executePlaylistFetch(proxyIndex) {
            if (proxyIndex >= proxyList.length || !window.apiDns) return;

            var currentProxy = proxyList[proxyIndex];
            var cleanDns = window.apiDns.endsWith('/') ? window.apiDns.slice(0, -1) : window.apiDns;
            var streamUrl = cleanDns + "/player_api.php?username=" + window.apiUser + "&password=" + window.apiPass + "&action=get_live_streams";
            var targetStream = currentProxy === "" ? streamUrl : currentProxy + encodeURIComponent(streamUrl);

            fetch(targetStream)
                .then(r => r.json())
                .then((res) => {
                    window.masterChannels = res;
                    
                    localStorage.setItem("gm_cached_channels", JSON.stringify(res));
                    localStorage.setItem("gm_cached_dns", window.apiDns);
                    localStorage.setItem("gm_cached_user", window.apiUser);
                    localStorage.setItem("gm_cached_pass", window.apiPass);

                    hideVipLoader();
                    buildChannelsGrid(window.masterChannels);
                }).catch(() => {
                    executePlaylistFetch(proxyIndex + 1);
                });
        }

        function hideVipLoader() {
            var loader = document.getElementById('vip-loader');
            if(loader) { loader.remove(); }
        }

        function buildChannelsGrid(items) {
            var grid = document.getElementById('channel-grid');
            if(!grid) return;
            if(!items || items.length === 0) {
                grid.innerHTML = '<div class="col-span-4 text-center text-gray-600 py-12 text-xs">No channels found.</div>';
                return;
            }

            grid.innerHTML = items.map(function(channel) {
                var iconUrl = channel.stream_icon || "https://placehold.co/150x150/111625/22d3ee?text=TV";
                var secureName = (channel.name || "Live TV").replace(/'/g, "\\'");
                var secureIcon = iconUrl.replace(/'/g, "\\'");
                
                return '<div class="channel-card p-1.5 flex flex-col items-center justify-center text-center aspect-square" onclick="playLiveChannel('+channel.stream_id+', \''+secureName+'\', \''+secureIcon+'\')">' +
                       '<div class="w-full h-10 flex items-center justify-center overflow-hidden mb-1 rounded bg-black/40 p-0.5">' +
                       '<img src="'+iconUrl+'" class="max-w-full max-h-full object-contain" onerror="this.src=\'https://placehold.co/150x150/111625/22d3ee?text=TV\'"/>' +
                       '</div>' +
                       '<h4 class="text-[9px] text-gray-300 line-clamp-1 uppercase font-medium w-full text-ellipsis overflow-hidden px-0.5">'+(channel.name || 'Live')+'</h4>' +
                       '</div>';
            }).join('');
        }

        window.resetChannelFilters = function(buttonElement) {
            document.getElementById('channel-search-input').value = "";
            buildChannelsGrid(window.masterChannels);
        };

        window.filterChannelsBySearch = function() {
            var query = document.getElementById('channel-search-input').value.toLowerCase().trim();
            var filtered = window.masterChannels;

            if(query !== "") {
                filtered = filtered.filter(function(channel) {
                    var channelName = (channel.name || "").toLowerCase();
                    return channelName.includes(query);
                });
            }
            buildChannelsGrid(filtered);
        };

        window.playLiveChannel = function(id, name, logo) {
            document.getElementById('player-placeholder').style.opacity = '0';
            var cleanDns = window.apiDns.endsWith('/') ? window.apiDns.slice(0, -1) : window.apiDns;
            var targetStreamUrl = cleanDns + "/live/" + window.apiUser + "/" + window.apiPass + "/" + id + ".m3u8";
            var player = document.getElementById('main-video-player');
            if(!player) return;

            if (Hls.isSupported()) {
                if (window.hlsInstance) { window.hlsInstance.destroy(); }
                var hls = new Hls(); hls.loadSource(targetStreamUrl); hls.attachMedia(player);
                window.hlsInstance = hls; player.play().catch(function(){});
            } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
                player.src = targetStreamUrl; player.play().catch(function(){});
            }
        };

        startAppEngine();
    </script>
</body>
</html>
